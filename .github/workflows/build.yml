name: Build Windows executable

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl

      - name: Build
        run: |
          mkdir -p dist
          g++ -std=c++17 -O2 -Wall -Wextra -o dist/dewechat.exe src/wechat.cpp -lcrypto

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: dewechat-windows-x64
          path: dist/dewechat.exe
